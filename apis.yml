aid: pdflayer
name: pdflayer
description: >
  pdflayer is a PDF generation REST API by APILayer for converting HTML to PDF and capturing
  web pages as PDFs. It supports rendering from standard HTTP URLs or raw HTML code, with
  extensive customization options including custom page sizes, margins, headers, footers,
  watermarks, and 256-bit encryption. The lightweight RESTful API supports both GET and POST
  methods and is powered by high-throughput infrastructure capable of processing thousands of
  requests simultaneously.
